services:

  postgres:
    image: postgres:16

    container_name: admin-team-pokemon-db

    environment:
      POSTGRES_DB: pokemondb
      POSTGRES_USER: pokemon_user
      POSTGRES_PASSWORD: pokemon_password

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    restart: unless-stopped

  redis:
    image: redis:7-alpine

    container_name: admin-team-pokemon-redis

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

    restart: unless-stopped

  pokemon-api:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: admin-team-pokemon-api

    depends_on:
      - postgres
      - redis

    environment:
      SPRING_PROFILES_ACTIVE: docker

      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/pokemondb
      SPRING_DATASOURCE_USERNAME: pokemon_user
      SPRING_DATASOURCE_PASSWORD: pokemon_password

      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379

      JWT_SECRET: MiSuperSecretJWTDeMasDe32Caracteres

    ports:
      - "8080:8080"

    restart: unless-stopped

volumes:
  postgres_data:
  redis_data: